name: CI

on:
  push:
    branches:
      - main
      - develop
  pull_request:
    branches:
      - main
      - develop

jobs:
  rust:
    name: Rust checks
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v6

      - name: Set up Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy

      - name: Cargo fmt
        run: cargo fmt --check

      - name: Cargo test
        run: cargo test --all-targets

      - name: Cargo clippy
        run: cargo clippy --all-targets -- -D warnings

  leaks:
    name: Leak checks (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os:
          - ubuntu-latest
          - macos-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v6

      - name: Set up nightly Rust with Miri
        uses: dtolnay/rust-toolchain@nightly
        with:
          components: miri

      - name: Configure Miri
        run: cargo miri setup

      - name: Run leak checks
        env:
          MIRIFLAGS: -Zmiri-disable-isolation
        run: cargo miri test --lib
