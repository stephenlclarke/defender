name: CI

on:
  push:
    branches:
      - main
      - develop
  pull_request:
    branches:
      - main
      - develop

jobs:
  rust:
    name: Rust checks
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Install system dependencies
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y libasound2-dev mesa-vulkan-drivers vulkan-tools xvfb

      - name: Set up Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy, llvm-tools-preview

      - name: Install cargo-llvm-cov
        uses: taiki-e/install-action@v2
        with:
          tool: cargo-llvm-cov

      - name: Diagnose CI prerequisites
        run: make ci-doctor

      - name: Run accepted runtime checks
        env:
          NEW_CODE_COVERAGE_BASE: ${{ github.event_name == 'pull_request' && github.event.pull_request.base.sha || github.event.before }}
        run: make ci

      - name: Run wgpu smoke gates
        env:
          LIBGL_ALWAYS_SOFTWARE: "1"
        run: xvfb-run -a make ci-smoke

  leaks:
    name: Leak checks (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os:
          - ubuntu-latest
          - macos-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v6

      - name: Install system dependencies
        if: runner.os == 'Linux'
        run: sudo apt-get update && sudo apt-get install -y libasound2-dev

      - name: Set up nightly Rust with Miri
        uses: dtolnay/rust-toolchain@nightly
        with:
          components: miri

      - name: Configure Miri
        run: cargo miri setup

      - name: Run leak checks
        env:
          MIRIFLAGS: -Zmiri-disable-isolation
        run: cargo miri test --lib
