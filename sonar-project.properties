# ------------------------------------------------------------
# SonarCloud Project Configuration
# ------------------------------------------------------------
sonar.projectKey=stephenlclarke_defender
sonar.projectName=defender
sonar.organization=stephenlclarke
sonar.host.url=https://sonarcloud.io
sonar.sourceEncoding=UTF-8

# ------------------------------------------------------------
# Source and Language Configuration
# ------------------------------------------------------------
sonar.sources=src,examples
sonar.tests=tests
sonar.inclusions=**/*.rs
sonar.test.inclusions=tests/**/*.rs
sonar.exclusions=target/**,docs/**,assets/**

# ------------------------------------------------------------
# Test and Coverage Reports
# ------------------------------------------------------------
sonar.rust.cobertura.reportPaths=target/coverage/coverage.xml
